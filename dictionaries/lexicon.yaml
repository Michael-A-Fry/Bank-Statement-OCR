# lexicon.yaml -- the engine's recognition VOCABULARIES (Admin -> Data capture ->
# Vocabulary, or edit here). Every category you DON'T list falls back to the
# built-in default, so an empty file behaves exactly like the shipped engine.
#
# How each category merges with the built-in (see R/lexicon.R):
#   * word lists   -> your entries are ADDED to the built-in (adding "cow" keeps
#                     "D"/"DR"/...); you cannot delete a built-in this way.
#   * regexes      -> your value REPLACES the built-in (rejected if it won't compile).
#   * date_formats -> your entries are APPENDED (tried after the built-ins).
#   * field_name_patterns -> your entry OVERRIDES the built-in for that field.
#
# Example: a bank that writes "cow"/"horse" for its debit/credit indicator column.
# Uncomment to teach the whole engine (detection + drafting + parsing) to recognise
# them -- no code change:
#
#   debit_markers:  [cow]
#   credit_markers: [horse]
#
# Editable categories: header_keywords, layout_stopwords, debit_markers,
# credit_markers, amount_style_debit_headers, amount_style_credit_headers,
# dr_cr_suffix_debit, dr_cr_suffix_credit, period_connectives, redaction_markers,
# redaction_block_glyphs, money_regex, date_regex, account_regex, card_regex,
# date_formats, field_name_patterns.
#
# Use the Admin "Show built-in defaults" button to see a full, valid starting point.
