# ASB Visa PDF. Legacy shape: Date | Details | Amount | Balance (a running
# balance IS in the table on this one). Closing balance labelled "Carried
# forward" / "Closing Balance". Day+month dates; year from the period.
# Coordinates are PLACEHOLDERS: draw the bands on a real statement in the toolkit.
id: asb_visa_pdf
bank: ASB
statement_type: visa
format: pdf
version: 1
currency: NZD
min_score: 2
fingerprint:
  page_contains_all: ["ASB", "Visa"]           # TODO confirm exact phrases
table:
  row_tol: 3
  date_format: "%d %b"
  amount_sign: signed
  columns:
    date:        {x_min: 40,  x_max: 90}       # TODO draw
    description: {x_min: 90,  x_max: 355}      # TODO draw
    amount:      {x_min: 355, x_max: 455}      # TODO draw
    balance:     {x_min: 455, x_max: 545}      # TODO draw
