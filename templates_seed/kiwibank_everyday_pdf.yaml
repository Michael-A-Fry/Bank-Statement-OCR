# Kiwibank everyday PDF. Legacy shape: Date | Details | Amount | Balance (running
# balance in the table). Day+month dates; year from the statement period. If the
# statement uses separate money-in / money-out columns, switch amount_sign to
# debit_credit_cols and give debit/credit bands instead of amount.
# Coordinates are PLACEHOLDERS: draw the bands on a real statement in the toolkit.
id: kiwibank_everyday_pdf
bank: Kiwibank
statement_type: everyday
format: pdf
version: 1
currency: NZD
min_score: 2
fingerprint:
  page_contains_all: ["Kiwibank"]              # TODO confirm exact phrases (add a column heading)
table:
  row_tol: 3
  date_format: "%d %b"
  amount_sign: signed
  columns:
    date:        {x_min: 40,  x_max: 90}       # TODO draw
    description: {x_min: 90,  x_max: 355}      # TODO draw
    amount:      {x_min: 355, x_max: 455}      # TODO draw
    balance:     {x_min: 455, x_max: 545}      # TODO draw
