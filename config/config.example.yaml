# Statement Studio configuration.
#
# Copy this file to  config/config.yaml  and edit it. config/config.yaml is
# kept out of any distributed copy, so your real settings (including the admin
# password) stay on the server. Any key you leave out falls back to a sensible built-in default,
# so a partial file is fine.

app:
  title: Statement Studio
  # The Admin-tab barrier - a simple gate to share with a few maintainers.
  # (Can also be set via the BSO_ADMIN_PASSWORD environment variable, which wins.)
  admin_password: changeme
  # The URL Qlik's "Convert a statement" tile opens. Point it at your Shiny deployment.
  shiny_url: http://localhost:8100
  port: 8100
  # Convert shows proven templates by default; a tick-box brings in user-created
  # ones. Set true to start with that box ticked (team mostly uses its own templates).
  user_templates_default: false

paths:
  templates: templates                 # PROVEN / curated templates (Qlik uses ONLY these)
  user_templates: templates_user       # analyst-made drafts (Shiny only, NEVER Qlik)
  fields: fields_templates
  user_fields: fields_templates_user
  dictionary: dictionaries/labels.yaml  # label wordings (Admin -> Templates -> Label dictionary)
  lexicon: dictionaries/lexicon.yaml     # recognition vocabulary (Admin -> Data capture -> Recognition vocabulary)
  uploads: uploads
  requests: requests
  logs: logs

# A `metadata:` block also exists (local-only capture detail). It is normally
# managed from Admin -> Data capture rather than hand-edited, so it is omitted
# here; see docs/context/metadata-capture.md for its keys and defaults.

feed:
  # The analytics feed Qlik loads for dashboards. Accountants convert in the Shiny
  # app; each result is written here (gated) and a Qlik folder connection + reload
  # turns it into dashboards. Only reconciled conversions from PROVEN templates
  # reach the dashboard table.
  enabled: true                         # write the feed on each conversion
  feed_dir: feed
  require_status_ok: true               # only clean conversions (status == ok)
  # medium (default) = every clean conversion; high = only balance-proven ones
  # (opening + txns = printed closing) - stricter, but a clean statement with no
  # running balance is 'medium' and would be withheld. any = no trust floor.
  min_trust: medium
  allowed_template_origins: [default]   # curated/proven only; add 'user' to include drafts
  template_allowlist: []                # optional: restrict to specific template ids
  include_review_feed: true             # also write withheld runs to feed/review (separate table)
